<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e0e3e5",
                        "tertiary": "#303335",
                        "inverse-surface": "#213145",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#96cbff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#88bef1",
                        "on-primary-fixed-variant": "#004a76",
                        "tertiary-container": "#474a4c",
                        "on-surface-variant": "#41474f",
                        "on-secondary-fixed-variant": "#004c6b",
                        "primary": "#003657",
                        "on-tertiary-container": "#b7b9bb",
                        "secondary": "#00658d",
                        "primary-fixed-dim": "#96cbff",
                        "surface-container-highest": "#d3e4fe",
                        "primary-fixed": "#cee5ff",
                        "on-secondary-fixed": "#001e2d",
                        "on-background": "#0b1c30",
                        "on-secondary-container": "#004866",
                        "background": "#f8f9ff",
                        "primary-container": "#004d7a",
                        "error-container": "#ffdad6",
                        "outline": "#717880",
                        "on-tertiary-fixed": "#191c1e",
                        "on-error-container": "#93000a",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#82cfff",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "secondary-fixed": "#c6e7ff",
                        "outline-variant": "#c1c7d0",
                        "surface-tint": "#266291",
                        "surface": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "surface-dim": "#cbdbf5",
                        "surface-bright": "#f8f9ff",
                        "on-primary-fixed": "#001d33",
                        "error": "#ba1a1a",
                        "secondary-container": "#2dbcfe",
                        "on-tertiary-fixed-variant": "#444749"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "gutter": "24px",
                        "sm": "8px",
                        "margin-desktop": "48px",
                        "margin-mobile": "16px",
                        "base": "8px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .active-tab {
            position: relative;
        }

        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #003657;
            border-radius: 99px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
    <!-- TopAppBar -->
    <header class="fixed top-0 left-0 w-full z-50 flex items-center px-margin-mobile h-16 bg-surface shadow-sm">
        <div class="flex items-center gap-4 w-full">
            <button
                class="material-symbols-outlined text-primary p-2 transition-all duration-200 active:scale-95 hover:bg-surface-container-high rounded-full">arrow_back</button>
            <h1 class="font-headline-sm text-headline-sm font-bold text-primary flex-1">Tablas Catálogos</h1>
            <button
                class="material-symbols-outlined text-primary p-2 transition-all duration-200 active:scale-95 hover:bg-surface-container-high rounded-full">history</button>
        </div>
    </header>
    <main class="pt-20 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto">
        <!-- Tab Switcher -->
        <div
            class="flex overflow-x-auto no-scrollbar gap-gutter border-b border-outline-variant mb-lg sticky top-16 bg-background/80 backdrop-blur-md z-40">
            <button
                class="active-tab py-4 px-2 whitespace-nowrap font-label-md text-label-md text-primary transition-all"
                id="tab-gasto" onclick="switchTab('gasto')">Tipos de Gasto</button>
            <button
                class="py-4 px-2 whitespace-nowrap font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all"
                id="tab-equipos" onclick="switchTab('equipos')">Equipos</button>
            <button
                class="py-4 px-2 whitespace-nowrap font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all"
                id="tab-mantenimiento" onclick="switchTab('mantenimiento')">Tipos de Mantenimiento</button>
        </div>
        <!-- Section Header -->
        <div class="flex items-center justify-between mb-lg">
            <div>
                <h2 class="font-headline-md text-headline-md text-primary" id="current-title">Tipos de Gasto</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant" id="current-subtitle">Gestione las
                    categorías financieras del sistema.</p>
            </div>
            <button
                class="bg-primary text-on-primary px-6 py-3 rounded-xl flex items-center gap-2 font-label-md text-label-md shadow-sm hover:bg-primary-container transition-all duration-200 active:scale-95">
                <span class="material-symbols-outlined text-[20px]">add</span>
                Añadir Nuevo
            </button>
        </div>
        <!-- Catalog Content - Bento Layout -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter" id="catalog-container">
            <!-- Dynamic items will be injected here by JS -->
        </div>
    </main>
    <!-- BottomNavBar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container-lowest shadow-[0_-4px_12px_rgba(0,77,122,0.08)]">
        <div
            class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1.5 transition-transform duration-200 active:scale-90 hover:text-primary">
            <span class="material-symbols-outlined">inventory_2</span>
            <span class="font-label-md text-label-md">Inventory</span>
        </div>
        <div
            class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-3 py-1.5 transition-transform duration-200 active:scale-90">
            <span class="material-symbols-outlined">build</span>
            <span class="font-label-md text-label-md">Maintenance</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1.5 transition-transform duration-200 active:scale-90 hover:text-primary">
            <span class="material-symbols-outlined">warning</span>
            <span class="font-label-md text-label-md">Alerts</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1.5 transition-transform duration-200 active:scale-90 hover:text-primary">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label-md text-label-md">Settings</span>
        </div>
    </nav>
    <script>
        const catalogData = {
            gasto: {
                title: "Tipos de Gasto",
                subtitle: "Gestione las categorías financieras del sistema.",
                items: [
                    { bodega: "Norte-01", nombre: "Consumibles Químicos", desc: "Reactivos y purificadores de agua para filtrado estándar." },
                    { bodega: "Sur-05", nombre: "Repuestos Críticos", desc: "Válvulas y sensores de presión de alta precisión." },
                    { bodega: "Central-02", nombre: "Mano de Obra Externa", desc: "Servicios técnicos especializados de terceros." },
                    { bodega: "Norte-02", nombre: "Logística", desc: "Costos de transporte de muestras y equipos." },
                    { bodega: "Oeste-03", nombre: "Energía Eléctrica", desc: "Consumo de bombas de succión industriales." }
                ]
            },
            equipos: {
                title: "Equipos",
                subtitle: "Inventario de maquinaria y herramientas activas.",
                items: [
                    { bodega: "Principal", nombre: "Bomba Hidráulica X-200", desc: "Motor de 15HP para flujo constante de red primaria." },
                    { bodega: "Taller B", nombre: "Sensor Ultrasonido", desc: "Medidor de nivel de tanque con precisión milimétrica." },
                    { bodega: "Norte-01", nombre: "Filtrador Industrial", desc: "Sistema de filtrado por ósmosis inversa de 3 etapas." },
                    { bodega: "Oeste-01", nombre: "Válvula Solenoide", desc: "Actuador automático para control de caudal remoto." }
                ]
            },
            mantenimiento: {
                title: "Tipos de Mantenimiento",
                subtitle: "Clasificación de protocolos de servicio técnico.",
                items: [
                    { bodega: "Sistemas", nombre: "Preventivo Mensual", desc: "Limpieza profunda y calibración de sensores de flujo." },
                    { bodega: "Logística", nombre: "Correctivo Urgente", desc: "Reparación inmediata por falla crítica del sistema." },
                    { bodega: "Planta Central", nombre: "Auditoría de Calidad", desc: "Revisión técnica semestral bajo estándares ISO." },
                    { bodega: "General", nombre: "Sustitución Programada", desc: "Cambio de piezas por fin de ciclo de vida útil." }
                ]
            }
        };

        function renderItems(category) {
            const container = document.getElementById('catalog-container');
            const data = catalogData[category];

            document.getElementById('current-title').textContent = data.title;
            document.getElementById('current-subtitle').textContent = data.subtitle;

            container.innerHTML = data.items.map((item, index) => `
                <div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_12px_rgba(0,77,122,0.08)] border border-transparent hover:border-primary-container transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-secondary-fixed text-on-secondary-fixed px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase">${item.bodega}</span>
                        <button class="material-symbols-outlined text-outline hover:text-error transition-colors">more_vert</button>
                    </div>
                    <h3 class="font-headline-sm text-headline-sm text-primary mb-2">${item.nombre}</h3>
                    <p class="font-body-sm text-body-sm text-on-surface-variant line-clamp-2 mb-6">${item.desc}</p>
                    <div class="flex items-center gap-4 border-t border-outline-variant pt-4 opacity-60 group-hover:opacity-100 transition-opacity">
                        <button class="flex items-center gap-1 font-label-md text-label-md text-secondary hover:text-primary">
                            <span class="material-symbols-outlined text-sm">edit</span> Editar
                        </button>
                        <button class="flex items-center gap-1 font-label-md text-label-md text-outline hover:text-error">
                            <span class="material-symbols-outlined text-sm">delete</span> Borrar
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(id) {
            // Update UI tabs
            ['gasto', 'equipos', 'mantenimiento'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === id) {
                    el.classList.add('active-tab', 'text-primary');
                    el.classList.remove('text-on-surface-variant');
                } else {
                    el.classList.remove('active-tab', 'text-primary');
                    el.classList.add('text-on-surface-variant');
                }
            });
            renderItems(id);
        }

        // Initial render
        renderItems('gasto');
    </script>
</body>

</html>
